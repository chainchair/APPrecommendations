{% extends 'base.html' %}

{% block content %}
<div class="login-container container container-inner">
    <h2 style="text-align: center;">Iniciar sesión</h2>
    
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-error">{{ message }}</div>
        {% endfor %}
    {% endif %}
    
    <form method="post" class="form ">
        {% csrf_token %}
        <div>
            <label for="username">Usuario o correo:</label>
            <input type="text" name="username" id="username" required>
        </div>
        <div>
            <label for="password">Contraseña:</label>
            <input type="password" name="password" id="password" required>
        </div>
        <button type="submit">Iniciar sesión</button>
    </form>
    <p style="text-align: center; color:#646464;">¿Aun no eres miembro?</p>
    <hr>
     <p style="text-align: center;"><a href="{% url 'users:registro' %}">Unete aqui</a> para tener <br>recomendaciones personalizadas</p>
</div>
{% endblock %}
